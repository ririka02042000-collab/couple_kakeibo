<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RT経費精算</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css">
  <script>
    // 未ログインならログイン画面へ
    if (sessionStorage.getItem('kakeibo_auth') !== '1') {
      location.replace('login.html');
    }
  </script>
</head>
<body>

  <!-- ヘッダー -->
  <header class="app-header">
    <h1>RT経費精算</h1>
    <div class="header-actions">
      <span id="gh-sync-status-header" class="gh-sync-status-header"></span>
      <button class="reload-btn" id="reload-btn" title="リロード">↺</button>
      <button class="settings-btn" id="settings-btn">⚙️</button>
    </div>
  </header>

  <!-- タブ -->
  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="home">ホーム</button>
    <button class="tab-btn" data-tab="history">履歴</button>
    <button class="tab-btn" data-tab="settle">精算</button>
  </nav>

  <!-- ホームタブ -->
  <div class="tab-content active" id="tab-home">

    <!-- 月選択 -->
    <div class="month-nav">
      <button id="prev-month">‹</button>
      <input type="month" id="current-month-input" class="month-input">
      <button id="next-month">›</button>
    </div>

    <!-- 残高カード -->
    <div class="balance-section">
      <div class="person-card girlfriend">
        <div class="person-name" id="name-girlfriend-display">彼女</div>
        <div class="person-amount" id="gf-amount">¥0</div>
        <div class="person-label">支出</div>
      </div>
      <div class="joint-card">
        <div class="joint-label">共用財布</div>
        <div class="joint-sub">
          <span><span class="joint-sub-label">支出</span><b id="joint-expense">¥0</b></span>
          <span><span class="joint-sub-label">入金</span><b id="joint-in">¥0</b></span>
        </div>
      </div>
      <div class="person-card boyfriend">
        <div class="person-name" id="name-boyfriend-display">彼氏</div>
        <div class="person-amount" id="bf-amount">¥0</div>
        <div class="person-label">支出</div>
      </div>
    </div>

    <!-- カテゴリ別集計 -->
    <div class="section-title">カテゴリ別支出</div>
    <div class="category-chart" id="category-chart"></div>

    <!-- 最近の取引 -->
    <div class="section-title">最近の取引</div>
    <div class="transaction-list" id="home-tx-list">
      <p class="empty-msg">取引がありません</p>
    </div>
  </div>

  <!-- 履歴タブ -->
  <div class="tab-content" id="tab-history">
    <!-- 月選択 -->
    <div class="month-nav history-month-nav">
      <button class="history-month-all-btn" id="history-all-btn">全期間</button>
      <button id="history-prev-month">‹</button>
      <input type="month" id="history-month-input" class="month-input">
      <button id="history-next-month">›</button>
    </div>
    <div class="filter-bar">
      <select id="filter-payer">
        <option value="">全員</option>
        <option value="girlfriend">彼女</option>
        <option value="boyfriend">彼氏</option>
        <option value="joint">共用財布</option>
      </select>
      <select id="filter-category">
        <option value="">全カテゴリ</option>
        <option value="食費">食費</option>
        <option value="住居費">住居費</option>
        <option value="交通費">交通費</option>
        <option value="光熱費">光熱費</option>
        <option value="通信費">通信費</option>
        <option value="医療費">医療費</option>
        <option value="娯楽費">娯楽費</option>
        <option value="衣類">衣類</option>
        <option value="外食">外食</option>
        <option value="旅行">旅行</option>
        <option value="その他">その他</option>
      </select>
      <select id="filter-type">
        <option value="">すべて</option>
        <option value="expense">支出</option>
        <option value="advance">立替</option>
        <option value="transfer">振替</option>
      </select>
    </div>
    <div id="history-tx-list"></div>

    <!-- CSV ダウンロード -->
    <div class="csv-dl-bar">
      <select id="csv-year-select" class="csv-year-sel"></select>
      <button id="csv-dl-btn" class="btn-csv-dl">⬇ CSVダウンロード</button>
    </div>
  </div>

  <!-- 精算タブ -->
  <div class="tab-content" id="tab-settle">
    <!-- 月選択 -->
    <div class="month-nav">
      <button id="settle-prev-month">‹</button>
      <input type="month" id="settle-month-input" class="month-input">
      <button id="settle-next-month">›</button>
    </div>
    <div class="section-title" id="settle-month-title">今月の内訳</div>
    <div class="breakdown-list" id="breakdown-list"></div>
    <div class="section-title" id="settle-all-title" style="margin-top:20px">全期間の内訳</div>
    <div class="breakdown-list" id="breakdown-list-all"></div>
  </div>

  <!-- 追加ボタン -->
  <button class="add-btn" id="add-btn">＋ 追加</button>

  <!-- 取引追加モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>取引を追加</h2>

      <!-- 種別 -->
      <div class="type-toggle">
        <button class="type-btn active" data-type="expense">支出</button>
        <button class="type-btn" data-type="advance">立替</button>
        <button class="type-btn" data-type="transfer">振替</button>
      </div>

      <!-- 支出元 -->
      <div class="form-group" id="payer-group">
        <label id="payer-group-label">支出元</label>
        <div class="payer-toggle">
          <button class="payer-btn active" data-payer="joint" id="payer-joint-btn">
            <span class="payer-avatar">🏦</span>
            <span class="payer-name">共用財布</span>
          </button>
          <button class="payer-btn" data-payer="girlfriend">
            <span class="payer-avatar">👩</span>
            <span class="payer-name" id="payer-gf-label">彼女</span>
          </button>
          <button class="payer-btn" data-payer="boyfriend">
            <span class="payer-avatar">👨</span>
            <span class="payer-name" id="payer-bf-label">彼氏</span>
          </button>
        </div>
      </div>

      <!-- 立替先（立替タイプのみ表示） -->
      <div class="form-group" id="advance-to-group" style="display:none">
        <label>立替先</label>
        <div class="payer-toggle">
          <button class="advance-to-btn active" data-to="girlfriend">
            <span class="payer-avatar">👩</span>
            <span class="payer-name" id="advance-to-gf-label">彼女</span>
          </button>
          <button class="advance-to-btn" data-to="boyfriend">
            <span class="payer-avatar">👨</span>
            <span class="payer-name" id="advance-to-bf-label">彼氏</span>
          </button>
        </div>
      </div>

      <!-- 振替先（振替タイプのみ表示） -->
      <div class="form-group" id="transfer-to-group" style="display:none">
        <label>振替先</label>
        <div class="payer-toggle">
          <button class="transfer-to-btn active" data-to="girlfriend">
            <span class="payer-avatar">👩</span>
            <span class="payer-name" id="transfer-to-gf-label">彼女</span>
          </button>
          <button class="transfer-to-btn" data-to="boyfriend">
            <span class="payer-avatar">👨</span>
            <span class="payer-name" id="transfer-to-bf-label">彼氏</span>
          </button>
          <button class="transfer-to-btn" data-to="joint">
            <span class="payer-avatar">🏦</span>
            <span class="payer-name">共用財布</span>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>金額 (円)</label>
        <input type="text" id="input-amount" placeholder="0" inputmode="none" autocomplete="off">
      </div>

      <div class="form-group" id="category-group">
        <label>カテゴリ</label>
        <select id="input-category">
          <option value="食費">食費</option>
          <option value="住居費">住居費</option>
          <option value="交通費">交通費</option>
          <option value="光熱費">光熱費</option>
          <option value="通信費">通信費</option>
          <option value="医療費">医療費</option>
          <option value="娯楽費">娯楽費</option>
          <option value="衣類">衣類</option>
          <option value="外食">外食</option>
          <option value="旅行">旅行</option>
          <option value="給与">給与</option>
          <option value="その他">その他</option>
        </select>
      </div>

      <div class="form-group">
        <label>メモ</label>
        <input type="text" id="input-note" placeholder="（任意）">
      </div>

      <div class="form-group">
        <label>日付</label>
        <input type="date" id="input-date">
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="btn-cancel">キャンセル</button>
        <button class="btn-save" id="btn-save">保存</button>
      </div>
    </div>
  </div>

  <!-- 設定モーダル -->
  <div class="modal-overlay" id="settings-overlay">
    <div class="modal settings-modal">
      <div class="modal-handle"></div>
      <div class="settings-modal-header">
        <h2>設定</h2>
        <button class="logout-btn" id="logout-btn">ログアウト</button>
      </div>
      <div class="form-group">
        <label>👩 彼女の名前</label>
        <input type="text" id="setting-gf-name" placeholder="彼女">
      </div>
      <div class="form-group">
        <label>👨 彼氏の名前</label>
        <input type="text" id="setting-bf-name" placeholder="彼氏">
      </div>
      <div class="form-group">
        <label>💰 支払い割合の履歴</label>
        <div class="ratio-history-list" id="ratio-history-list"></div>
      </div>

      <!-- 新しい割合を追加（折りたたみ） -->
      <div class="form-group ratio-add-section">
        <div class="collapse-toggle" id="ratio-add-toggle">
          <span>＋ 新しい割合を追加</span>
          <span class="collapse-arrow">▶</span>
        </div>
        <div class="collapse-body" id="ratio-add-body">
          <div class="form-group" style="margin-bottom:8px;margin-top:8px">
            <label style="font-size:0.72rem">適用開始月（月初から適用）</label>
            <input type="month" id="setting-ratio-date">
          </div>
          <div class="ratio-row">
            <div class="ratio-item">
              <span class="ratio-person" id="ratio-gf-label">彼女</span>
              <input type="number" id="setting-gf-ratio" placeholder="10000" min="0" inputmode="numeric">
            </div>
            <span class="ratio-colon">：</span>
            <div class="ratio-item">
              <span class="ratio-person" id="ratio-bf-label">彼氏</span>
              <input type="number" id="setting-bf-ratio" placeholder="10000" min="0" inputmode="numeric">
            </div>
          </div>
          <p class="ratio-hint">指定日以降の支出にこの割合を適用します</p>
        </div>
      </div>

      <!-- GitHub 連動（折りたたみ） -->
      <div class="form-group github-section">
        <div class="collapse-toggle" id="github-toggle">
          <span>🐙 GitHub 連動 <span id="gh-sync-status" class="gh-sync-status gh-none">未設定</span></span>
          <span class="collapse-arrow">▶</span>
        </div>
        <div class="collapse-body" id="github-body">
          <div class="gh-status-row" style="margin-top:8px">
            <button id="gh-sync-now-btn" class="btn-gh-sync-now">今すぐ同期</button>
          </div>
          <input type="password" id="gh-token" placeholder="Personal Access Token" autocomplete="new-password">
          <input type="text"     id="gh-repo"   placeholder="owner/repo （例: user/kakeibo）">
          <input type="text"     id="gh-branch" placeholder="ブランチ （例: main）">
          <p class="ratio-hint">トークンはこの端末のみに保存されます</p>
        </div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" id="settings-cancel">キャンセル</button>
        <button class="btn-save" id="settings-save">保存</button>
      </div>
    </div>
  </div>

  <!-- トークン失効アラート -->
  <div id="token-expired-overlay" class="token-alert-overlay">
    <div class="token-alert-box">
      <div class="token-alert-icon">⚠️</div>
      <p class="token-alert-msg">
        GitHubのトークンが失効しました。<br>
        新しいトークンを発行・入力するまで<br>
        同期が停止します。<br>
        <span class="token-alert-sub">詳細は彼女に聞いてください</span>
      </p>
      <button id="token-expired-ok" class="token-alert-btn">了解</button>
    </div>
  </div>

  <!-- 電卓キーボード -->
  <div id="calc-kb" class="calc-kb">
    <div class="calc-kb-grid">
      <button type="button" class="calc-btn calc-fn"  data-action="clear">AC</button>
      <button type="button" class="calc-btn calc-fn"  data-action="back">⌫</button>
      <button type="button" class="calc-btn calc-op"  data-val="÷">÷</button>
      <button type="button" class="calc-btn calc-op"  data-val="×">×</button>

      <button type="button" class="calc-btn"          data-val="7">7</button>
      <button type="button" class="calc-btn"          data-val="8">8</button>
      <button type="button" class="calc-btn"          data-val="9">9</button>
      <button type="button" class="calc-btn calc-op"  data-val="−">−</button>

      <button type="button" class="calc-btn"          data-val="4">4</button>
      <button type="button" class="calc-btn"          data-val="5">5</button>
      <button type="button" class="calc-btn"          data-val="6">6</button>
      <button type="button" class="calc-btn calc-op"  data-val="+">+</button>

      <button type="button" class="calc-btn"          data-val="1">1</button>
      <button type="button" class="calc-btn"          data-val="2">2</button>
      <button type="button" class="calc-btn"          data-val="3">3</button>
      <button type="button" class="calc-btn calc-eq"  data-action="eq">=</button>

      <button type="button" class="calc-btn calc-zero" data-val="0">0</button>
      <button type="button" class="calc-btn"           data-val=".">.</button>
      <button type="button" class="calc-btn calc-done" data-action="done">✓</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
